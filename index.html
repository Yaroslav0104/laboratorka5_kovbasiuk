<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Мій перший сайт</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
        }
        section {
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        footer {
            margin-top: 20px;
            padding: 10px;
            background-color: #222;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h1>Вітаю на моєму сайті 🚀 Лабораторну роботу майже завершено!</h1>
</header>

<section>
    <h2>Про мене</h2>
    <p>Це приклад простої HTML-сторінки з CSS стилями.</p>
    <button onclick="showMessage()">Натисни мене</button>
</section>

<footer>
    <p>© 2026 Мій сайт</p>
</footer>

<script>
    function showMessage() {
        alert("Ти натиснув кнопку!");
    }
</script>

</body>
</html>
